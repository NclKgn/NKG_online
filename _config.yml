title: PhD Dashboard
description: "Tableau de bord doctoral — Développement craniofacial"
url: "https://nclkgn.github.io"
baseurl: "/phd-dashboard"
lang: fr

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Collections
collections:
  lab-entries:
    output: true
    permalink: /lab-notebook/:name/
  meetings:
    output: true
    permalink: /meetings/:name/

# Navigation
nav:
  - title: Accueil
    url: /
  - title: Collecte
    url: /dashboard/
  - title: Thèse
    url: /thesis/
  - title: Cahier de labo
    url: /lab-notebook/
  - title: Blog
    url: /blog/
  - title: Réunions
    url: /meetings/

# Exclude from build
exclude:
  - README.md
  - données_phd.xlsx
  - update_dashboard.py
  - deploy_github.sh
  - new-entry.sh
  - "*.py"
  - "*.sh"
  - "*.xlsx"
  - node_modules
  - vendor
