<header class="site-nav">
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-logo">
      <span class="nav-logo-icon">🎓</span>
      <span class="nav-logo-text">PhD Dashboard</span>
    </a>
    <nav class="nav-links" id="nav-links">
      {% for item in site.nav %}
      <a href="{{ item.url | relative_url }}"
         class="nav-link {% if page.url == item.url or page.url contains item.url and item.url != '/' %}active{% endif %}"
      >{{ item.title }}</a>
      {% endfor %}
    </nav>
    <button class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
