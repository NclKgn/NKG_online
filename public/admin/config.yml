backend:
  name: github
  repo: NclKgn/NKG_online
  branch: main
  base_url: https://sveltia-cms-auth.nikogane.workers.dev

media_folder: public/uploads
public_folder: /NKG_online/uploads

collections:
  # ── Lab Entries (private) ──────────────────────────

  - name: lab-entries
    label: "Lab Entries"
    label_singular: "Lab Entry"
    folder: src/content/lab-entries
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date, title]
    summary: "{{year}}-{{month}}-{{day}} — {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Meetings (private) ─────────────────────────────

  - name: meetings
    label: "Meetings"
    label_singular: "Meeting"
    folder: src/content/meetings
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date, title]
    summary: "{{year}}-{{month}}-{{day}} — {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Attendees, name: attendees, widget: list, default: [] }
      - { label: Decisions, name: decisions, widget: list, default: [] }
      - label: Actions
        name: actions
        widget: list
        default: []
        fields:
          - { label: Tâche, name: text, widget: string }
          - { label: Fait, name: done, widget: boolean, default: false }
          - { label: Échéance, name: due, widget: string, required: false, hint: "Format YYYY-MM-DD" }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Newsletter (public) ────────────────────────────

  - name: newsletter
    label: "Newsletter"
    label_singular: "Newsletter Post"
    folder: src/content/newsletter
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: [date, title]
    summary: "{{year}}-{{month}}-{{day}} — {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
      - { label: Summary, name: summary, widget: text }
      - { label: Tags, name: tags, widget: list, default: [] }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Projects (public) ──────────────────────────────

  - name: projects
    label: "Projects"
    label_singular: "Project"
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    sortable_fields: [order, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Status, name: status, widget: select, options: [ongoing, completed, upcoming] }
      - { label: Domain, name: domain, widget: select, multiple: true, options: [research, clinical, engineering] }
      - { label: Summary, name: summary, widget: text }
      - { label: Collaborators, name: collaborators, widget: list, default: [] }
      - { label: Order, name: order, widget: number, default: 0, value_type: int }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Misc (public) ──────────────────────────────────

  - name: misc
    label: "Misc"
    label_singular: "Misc Entry"
    folder: src/content/misc
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Category, name: category, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, modes: [rich_text, raw] }

  # ── Data (public, structured YAML) ─────────────────

  - name: data
    label: "Data"
    files:
      - name: hero
        label: "Hero"
        file: src/data/hero.yaml
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Tagline, name: tagline, widget: string }
              - { label: Description, name: description, widget: text }

      - name: phd-progress
        label: "PhD Progress"
        file: src/data/phd-progress.yaml
        fields:
          - label: Overall
            name: overall
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
          - label: Biology
            name: biology
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
              - { label: Color, name: color, widget: color, required: false }
          - label: Biomechanics
            name: biomechanics
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
              - { label: Color, name: color, widget: color, required: false }
          - label: Human Data
            name: human-data
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: "Value (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
              - { label: Color, name: color, widget: color, required: false }

      - name: cv
        label: "CV"
        file: src/data/cv.yaml
        fields:
          - label: PhD Arts et Métiers
            name: phd-arts-metiers
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Medical Degree
            name: medical-degree
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }
          - label: CMF Necker
            name: cmf-necker
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }
          - label: Skull Base PhD
            name: skull-base-phd
            widget: object
            fields:
              - { label: Section, name: section, widget: select, options: [education, clinical, research, skills] }
              - { label: Year, name: year, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Description, name: description, widget: text }

      - name: stack
        label: "Stack"
        file: src/data/stack.yaml
        fields:
          - label: Molecular
            name: molecular
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }
          - label: 3D Imaging
            name: imaging-3d
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }
          - label: Biomechanics
            name: biomechanics
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }
          - label: Clinical Atlas
            name: clinical
            widget: object
            fields:
              - { label: Layer, name: layer, widget: string }
              - { label: Methods, name: methods, widget: string }
              - { label: Tools, name: tools, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Order, name: order, widget: number, value_type: int }

      # ── PhD Dashboard data ────────────────────────────

      - name: thesis
        label: "Thèse — Chapitres & Jalons"
        file: src/data/thesis.yaml
        fields:
          - label: thesis-data
            name: thesis-data
            widget: object
            fields:
              - label: Chapitres
                name: chapters
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Titre, name: title, widget: string }
                  - label: Statut
                    name: status
                    widget: select
                    options:
                      - { label: "Non démarré", value: non-demarre }
                      - { label: "En cours", value: en-cours }
                      - { label: "Terminé", value: termine }
                  - { label: "Avancement (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
                  - { label: Deadline, name: deadline, widget: string, required: false, hint: "YYYY-MM-DD" }
              - label: Publications
                name: publications
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Titre, name: title, widget: string }
                  - { label: Journal, name: journal, widget: string }
                  - label: Statut
                    name: status
                    widget: select
                    options:
                      - { label: Planifié, value: planifie }
                      - { label: En préparation, value: en-preparation }
                      - { label: Soumis, value: soumis }
                      - { label: Accepté, value: accepte }
                      - { label: Publié, value: publie }
                  - { label: Deadline, name: deadline, widget: string, required: false, hint: "YYYY-MM-DD" }
              - label: Jalons administratifs
                name: milestones
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Titre, name: title, widget: string }
                  - { label: Date, name: date, widget: string, hint: "YYYY-MM-DD" }
                  - label: Statut
                    name: status
                    widget: select
                    options:
                      - { label: À venir, value: upcoming }
                      - { label: Fait, value: done }

      - name: defense
        label: "Checklist soutenance"
        file: src/data/defense.yaml
        fields:
          - label: defense-data
            name: defense-data
            widget: object
            fields:
              - { label: Date cible, name: target_date, widget: string, hint: "YYYY-MM-DD" }
              - label: Étapes
                name: steps
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Étape, name: label, widget: string }
                  - label: Catégorie
                    name: category
                    widget: select
                    options:
                      - { label: Administratif, value: admin }
                      - { label: Jury, value: jury }
                      - { label: Manuscrit, value: manuscrit }
                  - label: Statut
                    name: status
                    widget: select
                    options:
                      - { label: Fait, value: done }
                      - { label: À venir, value: upcoming }
                      - { label: En attente, value: pending }
                  - { label: Date, name: date, widget: string, required: false, hint: "YYYY-MM-DD" }
                  - { label: Deadline, name: deadline, widget: string, required: false, hint: "YYYY-MM-DD" }

      - name: figures
        label: "Figures"
        file: src/data/figures.yaml
        fields:
          - label: figures-data
            name: figures-data
            widget: object
            fields:
              - label: Figures
                name: figures
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Titre, name: title, widget: string }
                  - label: Cible
                    name: target
                    widget: select
                    options:
                      - { label: "Article 1", value: article-1 }
                      - { label: "Article 2", value: article-2 }
                      - { label: "Scoping Review", value: article-scoping }
                      - { label: "Thèse", value: thesis }
                  - { label: Chapitre, name: chapter, widget: string, required: false }
                  - label: Statut
                    name: status
                    widget: select
                    options:
                      - { label: Finalisée, value: finalisee }
                      - { label: Brouillon, value: brouillon }
                      - { label: À refaire, value: a-refaire }
                  - { label: "Expérience source", name: source_experiment, widget: string, required: false }
                  - { label: "Dernière mise à jour", name: last_updated, widget: string, hint: "YYYY-MM-DD" }
                  - { label: Notes, name: notes, widget: text, required: false }
                  - { label: Auto-généré, name: auto_generated, widget: boolean, default: false, required: false }

      - name: collecte
        label: "Collecte de données"
        file: src/data/collecte.yaml
        fields:
          # ── Biologie ──
          - &collecte-item
            label: "Coloration"
            name: coloration
            widget: object
            fields: &collecte-fields
              - { label: Partie, name: partie, widget: select, options: [biologie, biomecanique, donnees-humaines] }
              - { label: Label, name: label, widget: string }
              - label: Statut
                name: statut
                widget: select
                options:
                  - { label: "Non démarré", value: non-demarre }
                  - { label: "En cours", value: en-cours }
                  - { label: "Terminé", value: termine }
              - { label: "Avancement (%)", name: value, widget: number, value_type: int, min: 0, max: 100 }
              - { label: Deadline, name: deadline, widget: string, required: false, hint: "YYYY-MM-DD" }
              - { label: Notes, name: notes, widget: text, required: false }
          - label: "RNAscope / IF"
            name: rnascope-if
            widget: object
            fields: *collecte-fields
          - label: "Light Sheet"
            name: light-sheet
            widget: object
            fields: *collecte-fields
          - label: "Analyse LS rat"
            name: analyse-ls-rat
            widget: object
            fields: *collecte-fields
          # ── Biomécanique ──
          - label: "Conception système"
            name: conception-systeme
            widget: object
            fields: *collecte-fields
          - label: "Validation"
            name: validation
            widget: object
            fields: *collecte-fields
          - label: "Culture ex vivo"
            name: culture-ex-vivo
            widget: object
            fields: *collecte-fields
          - label: "Mesures morphocentriques"
            name: mesures-morpho
            widget: object
            fields: *collecte-fields
          - label: "RNA-seq"
            name: rnaseq
            widget: object
            fields: *collecte-fields
          # ── Données Humaines ──
          - label: "Acquisition"
            name: acquisition
            widget: object
            fields: *collecte-fields
          - label: "Contrôle & aplasie post-natal"
            name: controle-postnatal
            widget: object
            fields: *collecte-fields
          - label: "Contrôle & aplasie anté-natal"
            name: controle-antenatal
            widget: object
            fields: *collecte-fields
          - label: "Validation landmarks"
            name: validation-landmarks
            widget: object
            fields: *collecte-fields
          - label: "Stats croissance"
            name: stats-croissance
            widget: object
            fields: *collecte-fields
          - label: "Patterns fermeture"
            name: patterns-fermeture
            widget: object
            fields: *collecte-fields

      - name: timeline
        label: "Timeline"
        file: src/data/timeline.yaml
        fields:
          - label: timeline
            name: timeline
            widget: object
            fields:
              - label: Événements
                name: entries
                widget: list
                summary: "{{fields.date}} — {{fields.label}}"
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Date, name: date, widget: string, hint: "YYYY-MM-DD" }
                  - { label: Libellé, name: label, widget: string }
                  - label: Type
                    name: type
                    widget: select
                    options:
                      - { label: Jalon, value: milestone }
                      - { label: Expérience, value: experiment }
                      - { label: Comité, value: committee }
                      - { label: Publication, value: publication }
                  - label: Statut
                    name: status
                    widget: select
                    options:
                      - { label: Fait, value: done }
                      - { label: En cours, value: in-progress }
                      - { label: À venir, value: upcoming }

      - name: labs
        label: "Labs"
        file: src/data/labs.yaml
        fields:
          - label: Lab 1
            name: lab-placeholder-1
            widget: object
            fields:
              - { label: Name, name: name, widget: string }
              - { label: PI, name: pi, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Work, name: work, widget: text }
              - { label: URL, name: url, widget: string, required: false }
          - label: Lab 2
            name: lab-placeholder-2
            widget: object
            fields:
              - { label: Name, name: name, widget: string }
              - { label: PI, name: pi, widget: string }
              - { label: Institution, name: institution, widget: string }
              - { label: Role, name: role, widget: string }
              - { label: Work, name: work, widget: text }
              - { label: URL, name: url, widget: string, required: false }

singletons:
  - name: visibility
    label: "Visibilité des sections"
    file: src/data/visibility.yaml
    icon: visibility
    fields:
      - label: "── Sections principales ──"
        name: _sep1
        widget: divider
        required: false
      - label: PhD
        name: phd
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: public
      - label: Projects
        name: projects
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: public
      - label: CV
        name: cv
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: public
      - label: Stack
        name: stack
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: public
      - label: Labs
        name: labs
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: public
      - label: Misc
        name: misc
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: public
      - label: "── Sous-pages PhD ──"
        name: _sep2
        widget: divider
        required: false
      - label: "PhD / Dashboard"
        name: phd/dashboard
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: guest
      - label: "PhD / Expériences"
        name: phd/experiments
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: guest
      - label: "PhD / Cahier de labo"
        name: phd/lab
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: private
      - label: "PhD / Réunions"
        name: phd/meetings
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: private
      - label: "PhD / Newsletter"
        name: phd/newsletter
        widget: select
        options:
          - { label: "Public (indexé)", value: public }
          - { label: "Invité (code requis)", value: guest }
          - { label: "Privé (dev uniquement)", value: private }
        default: public
