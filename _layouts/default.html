<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.extra_css %}
  <style>{{ page.extra_css }}</style>
  {% endif %}
</head>
<body>
  {% include nav.html %}
  <main class="site-main">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
      <span>PhD Dashboard · Développement craniofacial</span>
      <span class="footer-sep">·</span>
      <span>Mis à jour {{ site.time | date: "%d/%m/%Y" }}</span>
    </div>
  </footer>
  {% if page.extra_js %}
  <script>{{ page.extra_js }}</script>
  {% endif %}
</body>
</html>
